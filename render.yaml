services:
  - type: web
    name: vitamina-backend
    runtime: node
    plan: free

    # Render runs these from the repo root
    buildCommand: pnpm install && pnpm --filter @vitamina/backend build
    startCommand: cd apps/backend && npx prisma db push && node dist/index.js

    # Health check — Render uses this to know the service is alive
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # Set these in the Render dashboard (mark as secret):
      - key: DATABASE_URL
        sync: false          # filled in dashboard

      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value

      - key: FRONTEND_URL
        sync: false          # e.g. https://vitamina.vercel.app

      # Optional — set to a Render persistent disk mount path if you enable one
      # - key: UPLOADS_DIR
      #   value: /opt/render/project/uploads

      # Defaults that rarely need changing
      - key: JWT_EXPIRES_IN
        value: "7d"

      - key: BCRYPT_ROUNDS
        value: "12"
